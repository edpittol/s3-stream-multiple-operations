<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1840"/>
      <stop offset="0.55" stop-color="#241f5c"/>
      <stop offset="1" stop-color="#312a78"/>
    </linearGradient>
    <linearGradient id="cardbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2660"/>
      <stop offset="1" stop-color="#221d52"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1000" height="420" fill="url(#bg)"/>
  <rect width="1000" height="420" fill="url(#grid)"/>

  <!-- eyebrow -->
  <text x="64" y="86" fill="#a9a4e6" font-size="15" font-weight="700" letter-spacing="3.5">PHP · PERFORMANCE</text>

  <!-- headline -->
  <text x="62" y="168" font-size="44" font-weight="500" fill="#ffffff">Your <tspan font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#c9c3ff">file_exists()</tspan></text>
  <text x="62" y="224" font-size="50" font-weight="800" fill="#ffffff">is a network call</text>

  <!-- subtitle -->
  <text x="64" y="286" font-size="19" fill="#c4c0e8">One WordPress homepage spent 90% of its time</text>
  <text x="64" y="313" font-size="19" fill="#c4c0e8">on <tspan font-family="'SF Mono', ui-monospace, Menlo, Consolas, monospace" fill="#e6e3ff">HeadObject</tspan>. The code never changed — only the path.</text>

  <!-- url -->
  <text x="64" y="372" fill="#8f8ae0" font-size="17" font-weight="700">github.com/edpittol/s3-stream-multiple-operations</text>

  <!-- mapping card -->
  <rect x="612" y="96" width="324" height="228" rx="18" fill="url(#cardbg)" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- card header -->
  <text x="636" y="138" fill="#9d98d8" font-size="12" font-weight="700" letter-spacing="1.5">PHP CALL</text>
  <text x="912" y="138" fill="#9d98d8" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="end">S3 REQUEST</text>
  <line x1="636" y1="150" x2="912" y2="150" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- rows -->
  <g font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" font-size="13.5">
    <text x="636" y="184" fill="#e8e5ff">file_exists()</text>
    <rect x="826" y="171" width="86" height="20" rx="10" fill="#4f46b8"/>
    <text x="869" y="185" fill="#ffffff" font-size="12" text-anchor="middle">HeadObject</text>

    <text x="636" y="220" fill="#e8e5ff">is_dir()</text>
    <rect x="828" y="207" width="84" height="20" rx="10" fill="#3f7fb0"/>
    <text x="870" y="221" fill="#ffffff" font-size="12" text-anchor="middle">ListObjects</text>

    <text x="636" y="256" fill="#e8e5ff">unlink()</text>
    <rect x="818" y="243" width="94" height="20" rx="10" fill="#a05298"/>
    <text x="865" y="257" fill="#ffffff" font-size="12" text-anchor="middle">DeleteObject</text>

    <text x="636" y="292" fill="#e8e5ff">file_put_contents()</text>
    <rect x="838" y="279" width="74" height="20" rx="10" fill="#c25b5b"/>
    <text x="875" y="293" fill="#ffffff" font-size="12" text-anchor="middle">PutObject</text>
  </g>
</svg>

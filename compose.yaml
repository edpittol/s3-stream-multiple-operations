services:
  s3:
    image: minio/minio:latest
    # No container_name / no fixed host ports: containers, network, and volume
    # are namespaced by the Compose project name so instances stay isolated.
    ports:
      # Human-facing console only, on an ephemeral (Docker-assigned) host port.
      # The S3 API (9000) is reached over the internal network as s3:9000.
      - "9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - s3-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.5.0
    # Listener (20000) and admin (8474) are reached over the internal network
    # / `docker compose exec`; neither is published to the host.
    networks:
      - s3-network
    depends_on:
      s3:
        condition: service_healthy

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    working_dir: /app
    volumes:
      - .:/app
    networks:
      - s3-network
    depends_on:
      toxiproxy:
        condition: service_started
    environment:
      S3_ENDPOINT: http://toxiproxy:20000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    entrypoint: /bin/sh
    command: ["-c", "tail -f /dev/null"]

volumes:
  minio_data:

networks:
  s3-network:
    driver: bridge
